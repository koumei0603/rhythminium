<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>リズミニアム</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- タイトル画面 -->
<section id="screen-title" class="screen active">
  <div class="title-art">
    <img id="title-mascot" class="hidden" alt="">
    <div class="title-logo">RHYTHMINIUM</div>
    <div class="title-sub">— リズミニアム —</div>
    <div class="title-start">TOUCH TO START</div>
    <div class="title-keys">
      <span></span><span class="k-b"></span><span></span><span class="k-b"></span><span></span><span></span><span class="k-b"></span><span></span><span class="k-b"></span><span></span><span class="k-b"></span><span></span>
    </div>
  </div>
</section>

<!-- 曲選択画面 -->
<section id="screen-songs" class="screen">
  <div class="songs-layout">
    <div class="songs-left">
      <div class="songs-header">S o n g s</div>
      <ul id="song-list"></ul>
      <div id="admin-bar" class="hidden">
        <button id="btn-import" class="btn">＋ 曲を追加</button>
        <button id="btn-export" class="btn">公開用に書き出し</button>
        <input type="file" id="file-input" accept=".mp3,.wav,.ogg,.m4a" class="hidden">
      </div>
    </div>
    <div class="songs-right">
      <div id="song-art"></div>
      <div id="song-detail" class="hidden">
        <div id="detail-title" class="detail-title"></div>
        <div class="diff-row" id="diff-row"></div>
        <div id="detail-best" class="detail-best"></div>
        <div class="detail-actions">
          <button id="btn-play" class="btn btn-big">S t a r T</button>
        </div>
        <div id="detail-admin" class="detail-admin hidden">
          <button id="btn-edit" class="btn">譜面エディタ</button>
          <button id="btn-regen" class="btn">譜面を再生成</button>
          <button id="btn-thumb" class="btn">サムネ設定</button>
          <button id="btn-rename" class="btn">名前変更</button>
          <button id="btn-delete" class="btn btn-danger">曲を削除</button>
          <input type="file" id="thumb-input" accept=".png,.jpg,.jpeg,.webp,.gif" class="hidden">
        </div>
      </div>
      <div id="song-empty" class="song-empty">曲がありません</div>
    </div>
  </div>
  <div class="corner-btns">
    <button id="btn-to-title" class="round-btn" title="タイトルへ">←</button>
    <button id="btn-settings" class="round-btn" title="設定">⚙</button>
  </div>
</section>

<!-- 設定モーダル -->
<div id="settings-modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-title">S e t t i n g s</div>
    <label>ノーツ速度 <span id="speed-val"></span>
      <input type="range" id="set-speed" min="1" max="9" step="0.5">
    </label>
    <label>BGM音量 <span id="volume-val"></span>
      <input type="range" id="set-volume" min="0" max="10" step="0.5">
    </label>
    <label>タップ音 <span id="tap-val"></span>
      <input type="range" id="set-tap" min="0" max="10" step="0.5">
    </label>
    <button id="btn-settings-close" class="btn">閉じる</button>
  </div>
</div>

<!-- プレイ画面 -->
<section id="screen-game" class="screen">
  <div class="game-hud">
    <div class="hud-left">
      <div id="hud-title"></div>
      <div id="hud-diff"></div>
    </div>
    <div class="hud-right">
      <div id="hud-pct">0.00 %</div>
      <div id="hud-combo"></div>
    </div>
  </div>
  <canvas id="game-canvas"></canvas>
  <button id="btn-pause" class="round-btn pause-btn" title="ポーズ (Esc)">❚❚</button>
  <div id="game-pause" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">P a u s e</div>
      <button id="btn-resume" class="btn">再開</button>
      <button id="btn-retry" class="btn">最初から</button>
      <button id="btn-quit" class="btn">曲選択へ戻る</button>
    </div>
  </div>
</section>

<!-- リザルト画面 -->
<section id="screen-result" class="screen">
  <div class="result-box">
    <div id="result-title" class="result-title"></div>
    <div id="result-pct" class="result-pct"></div>
    <div id="result-new-best" class="result-new-best hidden">NEW RECORD</div>
    <div class="result-counts">
      <div>Charming <span id="rc-charming"></span></div>
      <div>Fine <span id="rc-fine"></span></div>
      <div>Miss <span id="rc-miss"></span></div>
      <div>Max Combo <span id="rc-combo"></span></div>
    </div>
    <div class="detail-actions">
      <button id="btn-result-retry" class="btn">もう一度</button>
      <button id="btn-result-back" class="btn">曲選択へ</button>
    </div>
  </div>
</section>

<!-- 譜面エディタ（管理者のみ / PWAビルドには含まれない） -->
<section id="screen-editor" class="screen">
  <div class="editor-bar">
    <button id="ed-back" class="btn">← 戻る</button>
    <span id="ed-title" class="ed-title"></span>
    <select id="ed-diff">
      <option value="easy">Easy</option>
      <option value="normal">Normal</option>
      <option value="hard">Hard</option>
    </select>
    <button id="ed-play" class="btn">▶ 再生</button>
    <select id="ed-rate" title="再生速度">
      <option value="1">速度 100%</option>
      <option value="0.75">速度 75%</option>
      <option value="0.5">速度 50%</option>
      <option value="0.25">速度 25%</option>
    </select>
    <button id="ed-zoom-out" class="btn">－</button>
    <button id="ed-zoom-in" class="btn">＋</button>
    <button id="ed-save" class="btn">保存</button>
    <span id="ed-info" class="ed-info">クリック:追加 / ノーツをドラッグ:移動 / 右クリック:削除 / ホイール:スクロール</span>
  </div>
  <canvas id="editor-canvas"></canvas>
</section>

<div id="toast" class="toast hidden"></div>

<script src="js/platform.js"></script>
<script src="js/audio.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
